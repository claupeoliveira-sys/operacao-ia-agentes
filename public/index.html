<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Sizing & Operação IA - Claupe Oliveira</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 900px; margin: auto; padding: 20px; background: #f8fafc; color: #1e293b; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        textarea { width: 100%; height: 100px; padding: 15px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; }

        /* Botões */
        .btn-main { background: #2563eb; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-sec { background: #64748b; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 10px; }

        .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Abas */
        .tabs { display: flex; margin-top: 30px; border-bottom: 2px solid #e2e8f0; overflow-x: auto; }
        .tab { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: 600; color: #64748b; white-space: nowrap; }
        .tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .tab-war { color: #db2777 !important; }

        .content { display: none; padding: 25px; background: white; border: 1px solid #e2e8f0; border-top: none; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
        .content.active { display: block; }
        .warroom-style { border-left: 5px solid #db2777; background: #fff1f2; }
        #model-list { display: none; font-family: monospace; font-size: 11px; padding: 10px; background: #e2e8f0; border-radius: 6px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 Otimização Operacional com IA</h1>

        <button class="btn-sec" onclick="consultarModelos()">🔍 Verificar Modelos de IA</button>
        <div id="model-list"></div>

        <p>Insira o Requisito / Product Story:</p>
        <textarea id="requisito" placeholder="Ex: Automatizar o fluxo de checkout e reduzir tempo de homologação..."></textarea>

        <button class="btn-main" id="btn-gerar" onclick="gerar()">
            <div class="spinner" id="loader"></div>
            <span id="btn-text">Iniciar Reunião dos Agentes</span>
        </button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="verTab(event, 'po')">PO (Analise)</button>
        <button class="tab" onclick="verTab(event, 'qa')">QA (Testes)</button>
        <button class="tab" onclick="verTab(event, 'rm')">Release (Risco)</button>
        <button class="tab" onclick="verTab(event, 'sizing')">Sizing (Pricing)</button>
        <button class="tab tab-war" onclick="verTab(event, 'warroom')">🔥 War Room</button>
    </div>

    <div id="po" class="content active">Aguardando requisito...</div>
    <div id="qa" class="content">Aguardando requisito...</div>
    <div id="rm" class="content">Aguardando requisito...</div>
    <div id="sizing" class="content">Aguardando requisito...</div>
    <div id="warroom" class="content warroom-style">Discussão estratégica aparecerá aqui.</div>

    <script>
        async function consultarModelos() {
            const list = document.getElementById('model-list');
            list.style.display = 'block';
            list.innerText = 'Consultando API Google...';
            try {
                const res = await fetch('/api/modelos');
                const data = await res.json();
                list.innerText = data.info + " " + data.lista.join(' | ');
            } catch {
                list.innerText = 'Erro ao listar modelos.';
            }
        }

        async function gerar() {
            const req = document.getElementById('requisito').value;
            const btn = document.getElementById('btn-gerar');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');

            if(!req) return alert("Por favor, descreva o requisito.");

            btn.disabled = true;
            loader.style.display = 'inline-block';
            btnText.innerText = 'Processando Agentes...';

            try {
                const response = await fetch('/api/processar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requisito: req })
                });

                const data = await response.json();

                document.getElementById('po').innerText = data.po;
                document.getElementById('qa').innerText = data.qa;
                document.getElementById('rm').innerText = data.rm;
                document.getElementById('sizing').innerText = data.sizing;
                document.getElementById('warroom').innerText = data.warroom;

            } catch (err) {
                alert("Erro técnico no processamento.");
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Iniciar Reunião dos Agentes';
            }
        }

        function verTab(evt, id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
