<!-- Substitua o trecho do botão e loader por este -->
<div class="actions" style="flex-direction: column; gap: 15px;">
    <button class="btn-main" id="btn-gerar" onclick="gerar()">
        <span id="btn-text">🚀 Iniciar Esteira de Agentes</span>
    </button>

    <!-- Barra de Status Visual -->
    <div id="status-container" style="display:none; width: 100%; background: #e2e8f0; border-radius: 8px; padding: 15px; box-sizing: border-box;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span id="status-step" style="font-weight: bold; color: #2563eb; font-size: 14px;">Iniciando...</span>
            <span id="status-percent" style="font-weight: bold; color: #64748b; font-size: 14px;">0%</span>
        </div>
        <div style="width: 100%; background: #cbd5e1; height: 8px; border-radius: 4px;">
            <div id="status-bar" style="width: 0%; background: #2563eb; height: 100%; border-radius: 4px; transition: width 0.5s ease;"></div>
        </div>
    </div>

    <button class="btn-pdf" id="btn-pdf" onclick="exportarPDF()">📄 Exportar Relatório Consolidado</button>
</div>

<script>
    // Nova função para atualizar o status na tela
    function atualizarStatus(step, percent) {
        document.getElementById('status-container').style.display = 'block';
        document.getElementById('status-step').innerText = step;
        document.getElementById('status-bar').style.width = percent + '%';
        document.getElementById('status-percent').innerText = percent + '%';
    }

    async function gerar() {
        const req = document.getElementById('requisito').value;
        const mod = document.getElementById('modelo').value;
        const btn = document.getElementById('btn-gerar');
        const pdf = document.getElementById('btn-pdf');

        if(!req) return alert("Insira o requisito!");

        btn.disabled = true;
        pdf.style.display = 'none';

        // Início da régua de status
        atualizarStatus("Mapeando Requisitos (PO)...", 10);

        try {
            // Simulando progresso enquanto espera a resposta longa do backend
            // Já que o fetch é uma promessa única, vamos quebrar o feedback visual
            const r = await fetch('/api/processar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ requisito: req, modelo: mod })
            });

            // Como o backend é sequencial, atualizamos após a resposta
            // Se quiser algo mais "vivo", o backend precisaria de WebSockets, 
            // mas via HTTP normal, o truque é atualizar em saltos:
            atualizarStatus("Validando Casos de Teste (QA)...", 40);

            const d = await r.json();
            if(!r.ok) throw new Error(d.error);

            atualizarStatus("Calculando Sizing e Riscos...", 80);

            dadosPdf = d;
            document.getElementById('po').innerText = d.po;
            document.getElementById('qa').innerText = d.qa;
            document.getElementById('rm').innerText = d.rm;
            document.getElementById('sizing').innerText = d.sizing;
            document.getElementById('warroom').innerText = d.warroom;

            atualizarStatus("Processamento Concluído!", 100);
            pdf.style.display = 'block';

        } catch (err) { 
            alert("ERRO: " + err.message); 
            atualizarStatus("Erro no processamento", 0);
        } finally { 
            btn.disabled = false; 
        }
    }
</script>
