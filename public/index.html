<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Sizing & IA Operational - Claupe Oliveira</title>
    <style>
        body { font-family: 'Inter', sans-serif; max-width: 900px; margin: auto; padding: 20px; background: #f8fafc; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        textarea { width: 100%; height: 100px; padding: 15px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 20px; font-size: 16px; box-sizing: border-box;}

        #btn-gerar { background: #2563eb; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .tabs { display: flex; margin-top: 30px; border-bottom: 2px solid #e2e8f0; }
        .tab { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: 600; color: #64748b; }
        .tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .content { display: none; padding: 20px; background: white; border: 1px solid #e2e8f0; border-top: none; white-space: pre-wrap; font-family: monospace; }
        .content.active { display: block; }
        .warroom-style { border-left: 5px solid #db2777; background: #fff1f2; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Otimização de Processos com IA</h1>
        <p>Insira a Product Story para o alinhamento dos agentes:</p>
        <textarea id="requisito" placeholder="Ex: Reduzir testers de 60 para 40 via automação de regression..."></textarea>

        <button id="btn-gerar" onclick="gerar()">
            <div class="spinner" id="loader"></div>
            <span id="btn-text">Processar Requisito</span>
        </button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="tab(event, 'res-po')">PO</button>
        <button class="tab" onclick="tab(event, 'res-qa')">QA</button>
        <button class="tab" onclick="tab(event, 'res-rm')">Release</button>
        <button class="tab" onclick="tab(event, 'res-sizing')">Sizing</button>
        <button class="tab" onclick="tab(event, 'res-warroom')" style="color:#db2777">🔥 War Room</button>
    </div>

    <div id="res-po" class="content active">Aguardando...</div>
    <div id="res-qa" class="content">Aguardando...</div>
    <div id="res-rm" class="content">Aguardando...</div>
    <div id="res-sizing" class="content">Aguardando...</div>
    <div id="res-warroom" class="content warroom-style">Aguardando discussão técnica...</div>

    <script>
        async function gerar() {
            const reqText = document.getElementById('requisito').value;
            const btn = document.getElementById('btn-gerar');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');

            if (!reqText) return alert("Digite o requisito!");

            btn.disabled = true;
            loader.style.display = 'inline-block';
            btnText.innerText = 'Agentes trabalhando...';

            try {
                const response = await fetch('/api/processar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requisito: reqText })
                });

                // Aqui está o segredo: verificar se o retorno é JSON antes
                const data = await response.json().catch(() => ({ error: "O servidor enviou uma resposta inválida (não JSON)." }));

                if (!response.ok) throw new Error(data.error || "Erro desconhecido");

                document.getElementById('res-po').innerText = data.po;
                document.getElementById('res-qa').innerText = data.qa;
                document.getElementById('res-rm').innerText = data.rm;
                document.getElementById('res-sizing').innerText = data.sizing;
                document.getElementById('res-warroom').innerText = data.warroom;

            } catch (err) {
                alert("Erro: " + err.message);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Processar Requisito';
            }
        }

        function tab(evt, id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
