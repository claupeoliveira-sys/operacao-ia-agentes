<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>SaaS Operação IA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: auto; padding: 20px; background: #f1f5f9; color: #334155; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        textarea { width: 100%; height: 100px; padding: 15px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; resize: vertical; }

        #btn-gerar { background: #2563eb; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s; }
        #btn-gerar:hover { background: #1d4ed8; }
        #btn-gerar:disabled { background: #94a3b8; cursor: not-allowed; }

        .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .tabs { display: flex; margin-top: 30px; border-bottom: 2px solid #e2e8f0; overflow-x: auto; }
        .tab { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: 600; color: #64748b; white-space: nowrap; }
        .tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .tab-war { color: #db2777 !important; }
        .tab-war.active { border-bottom-color: #db2777 !important; }

        .content { display: none; padding: 25px; background: white; border-radius: 0 0 12px 12px; border: 1px solid #e2e8f0; border-top: none; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
        .content.active { display: block; }
        .warroom-style { border-left: 5px solid #db2777; background: #fff1f2; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 Esteira Operacional IA</h1>
        <p>Descreva o requisito para a reunião dos agentes:</p>
        <textarea id="requisito" placeholder="Ex: Sistema de logística com tracking via API de 3 transportadoras..."></textarea>

        <button id="btn-gerar" onclick="gerar()">
            <div class="spinner" id="loader"></div>
            <span id="btn-text">Iniciar Processamento</span>
        </button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="verTab(event, 'po')">PO (Analise)</button>
        <button class="tab" onclick="verTab(event, 'qa')">QA (Testes)</button>
        <button class="tab" onclick="verTab(event, 'rm')">Release (Risco)</button>
        <button class="tab" onclick="verTab(event, 'sizing')">Sizing (Pricing)</button>
        <button class="tab tab-war" onclick="verTab(event, 'warroom')">🔥 War Room</button>
    </div>

    <div id="po" class="content active">Resultados do PO aparecerão aqui.</div>
    <div id="qa" class="content">Resultados do QA aparecerão aqui.</div>
    <div id="rm" class="content">Relatório de Release aparecerá aqui.</div>
    <div id="sizing" class="content">Cálculos de horas aparecerão aqui.</div>
    <div id="warroom" class="content warroom-style">Aguardando discussão técnica dos agentes...</div>

    <script>
        async function gerar() {
            const reqText = document.getElementById('requisito').value;
            const btn = document.getElementById('btn-gerar');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');

            if (!reqText) return alert("Por favor, digite um requisito!");

            btn.disabled = true;
            loader.style.display = 'inline-block';
            btnText.innerText = 'Agentes em reunião técnica...';

            try {
                const response = await fetch('/api/processar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requisito: reqText })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                document.getElementById('po').innerText = data.po;
                document.getElementById('qa').innerText = data.qa;
                document.getElementById('rm').innerText = data.rm;
                document.getElementById('sizing').innerText = data.sizing;
                document.getElementById('warroom').innerText = data.warroom;

            } catch (err) {
                alert("Erro no servidor: " + err.message);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Iniciar Processamento';
            }
        }

        function verTab(evt, id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
