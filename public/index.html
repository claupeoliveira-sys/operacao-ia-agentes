<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>SaaS Agentes IA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: auto; padding: 20px; background: #f8fafc; color: #1e293b; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        textarea { width: 100%; height: 100px; padding: 15px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 20px; font-size: 16px; box-sizing: border-box;}

        /* Estilo do Botão e Spinner */
        #btn-gerar { background: #2563eb; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        #btn-gerar:disabled { background: #94a3b8; cursor: not-allowed; }
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Abas */
        .tabs { display: flex; margin-top: 30px; border-bottom: 2px solid #e2e8f0; }
        .tab { padding: 12px 24px; cursor: pointer; border: none; background: none; font-weight: 600; color: #64748b; font-size: 14px; }
        .tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .content { display: none; padding: 25px; background: white; border-radius: 0 0 12px 12px; border: 1px solid #e2e8f0; border-top: none; white-space: pre-wrap; font-family: monospace; }
        .content.active { display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 Esteira Operacional IA</h1>
        <p>Insira o requisito de negócio para processamento dos agentes:</p>
        <textarea id="requisito" placeholder="Ex: Criar sistema de checkout via PIX..."></textarea>

        <button id="btn-gerar" onclick="gerar()">
            <div class="spinner" id="loader"></div>
            <span id="btn-text">Processar Requisito</span>
        </button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="verTab(event, 'po')">PO (Analise)</button>
        <button class="tab" onclick="verTab(event, 'qa')">QA (Testes)</button>
        <button class="tab" onclick="verTab(event, 'rm')">Release (Risco)</button>
        <button class="tab" onclick="verTab(event, 'sizing')">Sizing (Pricing)</button>
    </div>

    <div id="po" class="content active">Aguardando...</div>
    <div id="qa" class="content">Aguardando...</div>
    <div id="rm" class="content">Aguardando...</div>
    <div id="sizing" class="content">Aguardando...</div>

    <script>
        async function gerar() {
            const reqText = document.getElementById('requisito').value;
            const btn = document.getElementById('btn-gerar');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');

            if (!reqText) return alert("Por favor, digite um requisito!");

            // Iniciar Loading
            btn.disabled = true;
            loader.style.display = 'inline-block';
            btnText.innerText = 'Agentes em reunião...';

            try {
                const response = await fetch('/api/processar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requisito: reqText })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                document.getElementById('po').innerText = data.po;
                document.getElementById('qa').innerText = data.qa;
                document.getElementById('rm').innerText = data.rm;
                document.getElementById('sizing').innerText = data.sizing;

            } catch (err) {
                alert("Erro: " + err.message);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Processar Requisito';
            }
        }

        function verTab(evt, id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
