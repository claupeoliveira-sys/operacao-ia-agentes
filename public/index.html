<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Sizing & Operação IA - Claupe Oliveira</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: auto; padding: 20px; background: #f8fafc; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }

        .selector-box { margin-bottom: 20px; padding: 10px; background: #f1f5f9; border-radius: 8px; border: 1px solid #cbd5e1; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #cbd5e1; font-size: 14px; width: 100%; color: #334155; }

        textarea { width: 100%; height: 100px; padding: 15px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; }
        .btn-main { background: #2563eb; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .tabs { display: flex; margin-top: 30px; border-bottom: 2px solid #e2e8f0; overflow-x: auto; }
        .tab { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: 600; color: #64748b; }
        .tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .content { display: none; padding: 25px; background: white; border: 1px solid #e2e8f0; border-top: none; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
        .content.active { display: block; }
        .warroom-style { border-left: 5px solid #db2777; background: #fff1f2; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 Otimização Operacional com IA</h1>

        <div class="selector-box">
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">SELECIONAR MOTOR DE IA:</label>
            <select id="modelo-ia">
                <option value="gemini-2.0-flash" selected>Gemini 2.0 Flash (Mais Rápido / Recomendado)</option>
                <option value="gemini-1.5-flash">Gemini 1.5 Flash (Estável)</option>
                <option value="gemini-1.5-pro">Gemini 1.5 Pro (Mais Inteligente / Lento)</option>
            </select>
        </div>

        <p>Insira a Product Story:</p>
        <textarea id="requisito" placeholder="Ex: Criar fluxo de autorização de pagamentos..."></textarea>

        <button class="btn-main" id="btn-gerar" onclick="gerar()">
            <div class="spinner" id="loader"></div>
            <span id="btn-text">Iniciar Reunião dos Agentes</span>
        </button>
    </div>

    <!-- TABS MANTIDAS IGUAIS -->
    <div class="tabs">
        <button class="tab active" onclick="verTab(event, 'po')">PO</button>
        <button class="tab" onclick="verTab(event, 'qa')">QA</button>
        <button class="tab" onclick="verTab(event, 'rm')">Release</button>
        <button class="tab" onclick="verTab(event, 'sizing')">Sizing</button>
        <button class="tab" style="color:#db2777" onclick="verTab(event, 'warroom')">🔥 War Room</button>
    </div>

    <div id="po" class="content active">Resultados...</div>
    <div id="qa" class="content">Resultados...</div>
    <div id="rm" class="content">Resultados...</div>
    <div id="sizing" class="content">Resultados...</div>
    <div id="warroom" class="content warroom-style">Discussão aparecerá aqui.</div>

    <script>
        async function gerar() {
            const req = document.getElementById('requisito').value;
            const modelName = document.getElementById('modelo-ia').value;
            const btn = document.getElementById('btn-gerar');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');

            if(!req) return alert("Descreva o requisito.");

            btn.disabled = true;
            loader.style.display = 'inline-block';
            btnText.innerText = 'Processando com ' + modelName + '...';

            try {
                const response = await fetch('/api/processar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requisito: req, modelo: modelName })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                document.getElementById('po').innerText = data.po;
                document.getElementById('qa').innerText = data.qa;
                document.getElementById('rm').innerText = data.rm;
                document.getElementById('sizing').innerText = data.sizing;
                document.getElementById('warroom').innerText = data.warroom;

            } catch (err) {
                alert("Erro: " + err.message);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Iniciar Reunião dos Agentes';
            }
        }

        function verTab(evt, id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
